name: Refrescar estadísticas del Mundial

# 4 oportunidades de disparo al día (en minuto :07 para evitar el throttling
# de GH Actions en los minutos pico). Cada slot se ejecutará de forma
# independiente; el script es idempotente y respeta una TTL de 23 h para los
# stats por equipo (que son caros: 48 req por refresco).
#
# Slots planificados (UTC):
#   05:07  ≈ 07:07 hora España CEST  ← refresco "matutino"
#   11:07  ≈ 13:07
#   17:07  ≈ 19:07
#   23:07  ≈ 01:07
on:
  schedule:
    - cron: '7 5 * * *'
    - cron: '7 11 * * *'
    - cron: '7 17 * * *'
    - cron: '7 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-stats
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pedir stats a football-data.org
        # Reutilizamos FOOTBALL_DATA_KEY (la misma del cron de resultados).
        # API-Football free tier no expone WC 2026, así que pivotamos a
        # football-data.org que sí tiene cobertura completa de 2026.
        env:
          FOOTBALL_DATA_KEY:         ${{ secrets.FOOTBALL_DATA_KEY }}
          FOOTBALL_DATA_COMPETITION: ${{ vars.FOOTBALL_DATA_COMPETITION || 'WC' }}
          FOOTBALL_DATA_SEASON:      ${{ vars.FOOTBALL_DATA_SEASON || '2026' }}
        run: node scripts/generate-stats.js

      - name: Commit si hubo cambios
        # Importante: `git add` primero y luego `git diff --cached` para detectar
        # también archivos NUEVOS (no sólo modificaciones de archivos ya tracked).
        # En la primera ejecución data/stats.json no existe en el repo, por eso
        # el `git diff --quiet -- data/stats.json` plano no ve el archivo nuevo.
        run: |
          git add data/stats.json 2>/dev/null || true
          if git diff --cached --quiet -- data/stats.json; then
            echo "Sin cambios — no se hace commit."
            exit 0
          fi
          git config user.name  "perraza-bot"
          git config user.email "perraza-bot@users.noreply.github.com"
          git commit -m "auto: refrescar estadísticas del Mundial"
          git push
