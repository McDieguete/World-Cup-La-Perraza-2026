name: Auto-actualizar resultados y clasificación

# GitHub Actions free tier descarta schedules cuando los runners están
# saturados. Para maximizar la probabilidad de que al menos UNA ejecución
# entre por hora, declaramos 4 schedules independientes en minutos primos
# (poco cargados, ya que la mayoría de proyectos programan en múltiplos de 5).
# Si las 4 se descartan en una hora dada, la siguiente vuelve a intentarlo.
# El cron es idempotente: ejecuciones extra no producen commits si no hay
# resultados nuevos que añadir.
# También se puede disparar a mano desde la pestaña "Actions" de GitHub.
on:
  schedule:
    - cron: '3 * * * *'
    - cron: '17 * * * *'
    - cron: '31 * * * *'
    - cron: '47 * * * *'
  workflow_dispatch:

# Permiso necesario para que el GITHUB_TOKEN pueda hacer commit/push.
permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # token con permiso de escritura (el por defecto vale gracias a `permissions: contents: write`)
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pedir resultados a football-data.org y recomputar
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          FOOTBALL_DATA_COMPETITION: ${{ vars.FOOTBALL_DATA_COMPETITION || 'WC' }}
          FOOTBALL_DATA_SEASON: ${{ vars.FOOTBALL_DATA_SEASON || '2026' }}
        run: node scripts/update-results.js

      - name: Commit si hubo cambios
        run: |
          if git diff --quiet -- js/data.js; then
            echo "Sin cambios — no se hace commit."
            exit 0
          fi
          git config user.name  "perraza-bot"
          git config user.email "perraza-bot@users.noreply.github.com"
          git add js/data.js
          git commit -m "auto: actualizar resultados y clasificación"
          git push
