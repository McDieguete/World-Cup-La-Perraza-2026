name: Auto-actualizar resultados y clasificación

# ─────────────────────────────────────────────────────────────
# Trigger:
#   · schedule (4 crons en minutos primos) → sirve de "red de seguridad";
#     en la práctica GH Actions free tier descarta la mayoría.
#   · workflow_dispatch → la cadencia REAL la consigue el propio job
#     reinvocándose al final con un PAT (variable PAT_DISPATCH).
# Cada ejecución hace 1 actualización inmediata y se autoinvoca tras 15 min.
# ─────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '3 * * * *'
    - cron: '17 * * * *'
    - cron: '31 * * * *'
    - cron: '47 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pedir resultados a football-data.org y recomputar
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          FOOTBALL_DATA_COMPETITION: ${{ vars.FOOTBALL_DATA_COMPETITION || 'WC' }}
          FOOTBALL_DATA_SEASON: ${{ vars.FOOTBALL_DATA_SEASON || '2026' }}
        run: node scripts/update-results.js

      - name: Commit si hubo cambios
        run: |
          if git diff --quiet -- js/data.js; then
            echo "Sin cambios — no se hace commit."
            exit 0
          fi
          git config user.name  "perraza-bot"
          git config user.email "perraza-bot@users.noreply.github.com"
          git add js/data.js
          git commit -m "auto: actualizar resultados y clasificación"
          git push

      # Refresca también las stats del Mundial en el MISMO ciclo (~15 min), así
      # se actualizan a la par que los resultados en vez de 4 veces al día.
      # Sólo +2 peticiones por ciclo (standings + scorers) → muy por debajo del
      # límite de 10 req/min. `continue-on-error` para que un fallo de stats
      # NUNCA afecte a los resultados ni rompa el autochain de abajo.
      - name: Refrescar estadísticas del Mundial (mismo ciclo)
        continue-on-error: true
        env:
          FOOTBALL_DATA_KEY:         ${{ secrets.FOOTBALL_DATA_KEY }}
          FOOTBALL_DATA_COMPETITION: ${{ vars.FOOTBALL_DATA_COMPETITION || 'WC' }}
          FOOTBALL_DATA_SEASON:      ${{ vars.FOOTBALL_DATA_SEASON || '2026' }}
        run: node scripts/generate-stats.js

      - name: Commit stats si hubo cambios
        continue-on-error: true
        run: |
          git add data/stats.json 2>/dev/null || true
          if git diff --cached --quiet -- data/stats.json; then
            echo "Stats sin cambios — no se hace commit."
            exit 0
          fi
          git config user.name  "perraza-bot"
          git config user.email "perraza-bot@users.noreply.github.com"
          git commit -m "auto: refrescar estadísticas del Mundial"
          git pull --rebase --autostash || true
          git push

      - name: Esperar 15 min y re-disparar el workflow (autochain)
        # CRÍTICO: `if: always()` para que la cadena SOBREVIVA a fallos
        # transitorios del script (rate limit de la API, blip de red, etc.).
        # Sin `always()`, un solo run en error mata la cadena para siempre y
        # hay que rearmarla manualmente desde la pestaña Actions.
        # Si PAT_DISPATCH no está configurado, este paso se salta y el workflow
        # termina (caerá la red de seguridad del schedule, que puede tardar).
        if: ${{ always() && env.HAS_PAT == 'true' }}
        env:
          HAS_PAT: ${{ secrets.PAT_DISPATCH != '' }}
          PAT_DISPATCH: ${{ secrets.PAT_DISPATCH }}
        run: |
          echo "Esperando 15 minutos antes de re-disparar…"
          sleep 900
          echo "Disparando siguiente ejecución…"
          curl -sS -X POST \
            -H "Authorization: Bearer ${PAT_DISPATCH}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/update-results.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "Siguiente ejecución encolada."
